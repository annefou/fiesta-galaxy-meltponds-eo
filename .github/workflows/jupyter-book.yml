name: Build and Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Node.js + npm are preinstalled on ubuntu-latest, so no setup-node needed.
      - name: Install MyST
        run: npm install -g mystmd@1.10.1

      - name: Build MyST site
        # MyST silently ignores `base_url` in myst.yml — only this env var works,
        # and it must match the GitHub Pages project path (/<repo-name>).
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: myst build --html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
