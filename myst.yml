version: 1
project:
  title: "Counting Greenland melt ponds with off-the-shelf bioimage tools"
  authors:
    - name: "Anne Fouilloux"
      orcid: "https://orcid.org/0000-0002-1784-2920"
      affiliations:
        - "Lifewatch ERIC"
  github: https://github.com/annefou/fiesta-galaxy-meltponds-eo
  license: MIT
  keywords:
    - galaxy
    - image-analysis
    - cross-discipline
    - earth-observation
    - supraglacial-lakes
    - sentinel-2
    - FIESTA
    - OSCARS
  toc:
    - file: index.md
    - file: tutorial/tutorial.md
    - file: results/README.md
    - file: data/README.md
