site:
  title: "Greenland melt ponds — cross-discipline Galaxy imaging"
  # Local favicon so the MyST build never fetches the remote default (that fetch
  # is flaky in CI and can fail the build with ERR_STREAM_PREMATURE_CLOSE).
  options:
    favicon: figures/favicon.png
# Do NOT set base_url here — MyST silently ignores it. BASE_URL is set as an env
# var on the `myst build` step in .github/workflows/jupyter-book.yml.
